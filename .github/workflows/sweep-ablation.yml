name: Sweep (ablation)

# Paper-mode ablation runs that turn off exactly ONE extension at a time so
# each can be cleanly attributed in the IEEE paper. Three ablations are
# parameterised by the `ablation` input:
#   noPBRS  -> reward_shaping=none, adaptive_trust=true   (does PBRS matter?)
#   noTrust -> reward_shaping=pbrs, adaptive_trust=false  (does E3 matter?)
#   noPrior -> reward_shaping=pbrs, adaptive_trust=true,
#              stereo_prior_scale=0.0                     (sanity check: ql_true == ql_false?)
#
# Defaults: 3 seeds (sufficient for ablation per Munafo et al. 2017 and the
# project's pre-registration), all 7 profiles. Each invocation produces an
# independent artefact `results_ablation_<name>/` that sweep_report.py can
# aggregate alongside the main sweep.

on:
  workflow_dispatch:
    inputs:
      ablation:
        description: "Which extension to disable"
        type: choice
        required: true
        options:
          - noPBRS
          - noTrust
          - noPrior
        default: noPBRS
      profiles:
        description: "Comma-separated profiles (default: all 7)"
        required: false
        default: "custom2,custom3,custom4,custom5,custom6,custom7,custom8"
      seeds:
        description: "Comma-separated RNG seeds (default: 1,2,3)"
        required: false
        default: "1,2,3"
      dry_run:
        description: "Resolve matrix and print config patch only; no training"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  # One ablation at a time per kind; different kinds may run in parallel.
  group: sweep-ablation-${{ github.event.inputs.ablation }}
  cancel-in-progress: false

env:
  RUN_MODE: paper
  ABLATION: ${{ github.event.inputs.ablation }}
  PROFILES: ${{ github.event.inputs.profiles || 'custom2,custom3,custom4,custom5,custom6,custom7,custom8' }}
  SEEDS:    ${{ github.event.inputs.seeds    || '1,2,3' }}
  DRY_RUN:  ${{ github.event.inputs.dry_run  || 'false' }}

jobs:
  setup:
    name: Compile, patch config & cache
    runs-on: ubuntu-latest
    outputs:
      profiles_json: ${{ steps.profiles.outputs.json }}
      seeds_json:    ${{ steps.seeds.outputs.json }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Patch config/run_config.json for ablation
        shell: bash
        run: |
          set -euo pipefail
          cfg=config/run_config.json
          cp "$cfg" "${cfg}.orig"
          case "${{ env.ABLATION }}" in
            noPBRS)
              jq '.learning.reward_shaping="none"
                | .learning.adaptive_trust=true' "$cfg" > "${cfg}.tmp"
              ;;
            noTrust)
              jq '.learning.reward_shaping="pbrs"
                | .learning.adaptive_trust=false' "$cfg" > "${cfg}.tmp"
              ;;
            noPrior)
              jq '.learning.reward_shaping="pbrs"
                | .learning.adaptive_trust=true
                | .learning.stereo_prior_scale=0.0' "$cfg" > "${cfg}.tmp"
              ;;
            *) echo "Unknown ablation: ${{ env.ABLATION }}"; exit 2 ;;
          esac
          mv "${cfg}.tmp" "$cfg"
          echo "-- patched learning block --"
          jq '.learning' "$cfg"
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Compile classes
        if: env.DRY_RUN != 'true'
        run: ./gradlew --no-daemon classes
      - name: Upload compiled build + patched config
        if: env.DRY_RUN != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-classes-${{ env.ABLATION }}
          path: |
            build/classes
            build/resources
            build/generated
            config/run_config.json
          if-no-files-found: error
          retention-days: 1
      - name: Materialise matrix profile list
        id: profiles
        shell: bash
        run: |
          profs="${{ env.PROFILES }}"
          json=$(echo "$profs" | tr ',' '\n' | jq -R . | jq -sc .)
          echo "json=$json" >> "$GITHUB_OUTPUT"
      - name: Materialise matrix seed list
        id: seeds
        shell: bash
        run: |
          seeds="${{ env.SEEDS }}"
          json=$(echo "$seeds" | tr ',' '\n' | jq -R 'tonumber' | jq -sc .)
          echo "json=$json" >> "$GITHUB_OUTPUT"
      - name: Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "DRY RUN -- no training will be performed."
          echo "ablation = ${{ env.ABLATION }}"
          echo "profiles = ${{ steps.profiles.outputs.json }}"
          echo "seeds    = ${{ steps.seeds.outputs.json }}"

  train:
    name: train ${{ matrix.profile }} stereo=${{ matrix.stereo }} seed=${{ matrix.seed }} ablation=${{ github.event.inputs.ablation }}
    needs: setup
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJson(needs.setup.outputs.profiles_json) }}
        stereo:  ["true", "false"]
        seed:    ${{ fromJson(needs.setup.outputs.seeds_json) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache global npm (node-red)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-noderered-${{ runner.os }}-v4
      - name: Install Node-RED
        run: npm install -g --unsafe-perm node-red@4
      - name: Download compiled build + patched config
        uses: actions/download-artifact@v4
        with:
          name: build-classes-${{ env.ABLATION }}
          path: .
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Show active learning config (sanity)
        run: jq '.learning' config/run_config.json
      - name: Run training cell
        shell: pwsh
        run: |
          ./run_full_project.ps1 `
            -RunMode ${{ env.RUN_MODE }} `
            -OnlyProfiles ${{ matrix.profile }} `
            -OnlyStereo ${{ matrix.stereo }} `
            -RunSeed ${{ matrix.seed }} `
            -SkipBenchmark `
            -SkipPreflight
      - name: Upload training artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-${{ env.ABLATION }}-${{ matrix.profile }}-stereo-${{ matrix.stereo }}-seed-${{ matrix.seed }}
          path: |
            qtable_final_stereotypes_${{ matrix.stereo }}_${{ matrix.profile }}*.csv
            metrics_stereotypes_${{ matrix.stereo }}_${{ matrix.profile }}.csv
            iv_stats_stereotypes_${{ matrix.stereo }}_${{ matrix.profile }}.json
            coverage_stereotypes_${{ matrix.stereo }}_${{ matrix.profile }}.csv
            first_goal_stereotypes_${{ matrix.stereo }}_${{ matrix.profile }}.csv
            learned_stereotypes_${{ matrix.stereo }}_${{ matrix.profile }}.ttl
            benchmark/results/${{ matrix.profile }}/training_stereo_${{ matrix.stereo }}/**
            log/train_${{ matrix.profile }}_stereo_${{ matrix.stereo }}.log
            log/train_${{ matrix.profile }}_stereo_${{ matrix.stereo }}.err.log
            run_full_project.log
          if-no-files-found: warn
          retention-days: 60

  bench:
    name: bench ${{ matrix.profile }} mode=${{ matrix.mode }} seed=${{ matrix.seed }} ablation=${{ github.event.inputs.ablation }}
    needs: [setup, train]
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJson(needs.setup.outputs.profiles_json) }}
        mode:    ["rule_based", "ql_false", "ql_true"]
        seed:    ${{ fromJson(needs.setup.outputs.seeds_json) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache global npm (node-red)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-noderered-${{ runner.os }}-v4
      - name: Install Node-RED
        run: npm install -g --unsafe-perm node-red@4
      - name: Download compiled build + patched config
        uses: actions/download-artifact@v4
        with:
          name: build-classes-${{ env.ABLATION }}
          path: .
      - name: Download stereo=true training artefacts
        uses: actions/download-artifact@v4
        with:
          name: train-${{ env.ABLATION }}-${{ matrix.profile }}-stereo-true-seed-${{ matrix.seed }}
          path: .
      - name: Download stereo=false training artefacts
        uses: actions/download-artifact@v4
        with:
          name: train-${{ env.ABLATION }}-${{ matrix.profile }}-stereo-false-seed-${{ matrix.seed }}
          path: .
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run benchmark cell
        shell: pwsh
        run: |
          ./run_full_project.ps1 `
            -RunMode ${{ env.RUN_MODE }} `
            -OnlyProfiles ${{ matrix.profile }} `
            -OnlyModes ${{ matrix.mode }} `
            -RunSeed ${{ matrix.seed }} `
            -SkipTraining `
            -SkipPreflight
      - name: Upload benchmark artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ env.ABLATION }}-${{ matrix.profile }}-${{ matrix.mode }}-seed-${{ matrix.seed }}
          path: |
            benchmark/results/${{ matrix.profile }}/${{ matrix.mode }}/**
            benchmark_results_${{ matrix.mode }}.csv
            bench_step_log_${{ matrix.mode }}.csv
            log/benchmark_sweep.log
            run_full_project.log
          if-no-files-found: warn
          retention-days: 60

  aggregate:
    name: Aggregate ablation (${{ github.event.inputs.ablation }})
    needs: bench
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install analysis deps
        run: pip install numpy scipy matplotlib
      - name: Download all training artefacts (this ablation)
        uses: actions/download-artifact@v4
        with:
          pattern: train-${{ env.ABLATION }}-*
          path: _artifacts/train
      - name: Download all benchmark artefacts (this ablation)
        uses: actions/download-artifact@v4
        with:
          pattern: bench-${{ env.ABLATION }}-*
          path: _artifacts/bench
      - name: Reconstruct per-seed layout under results_ablation_<name>/
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          base="benchmark/results_ablation_${{ env.ABLATION }}"
          for d in _artifacts/train/*/ _artifacts/bench/*/; do
            name=$(basename "$d")
            seed=$(echo "$name" | sed -nE 's/.*-seed-([0-9]+)$/\1/p')
            if [ -z "$seed" ]; then echo "WARN: no seed in $name"; continue; fi
            mkdir -p "${base}_seed${seed}"
            if [ -d "${d}benchmark/results" ]; then
              cp -rn "${d}benchmark/results"/* "${base}_seed${seed}/" 2>/dev/null || true
            fi
          done
          echo "-- ablation layout --"
          for sd in ${base}_seed*/; do
            echo "[$sd]"
            find "$sd" -maxdepth 3 -type d | sort | head -20
          done
      - name: Stage seed-1 ablation results at canonical path for sweep_report
        shell: bash
        run: |
          set -euo pipefail
          src="benchmark/results_ablation_${{ env.ABLATION }}_seed1"
          if [ -d "$src" ]; then
            mkdir -p benchmark/results
            cp -rn "$src"/* benchmark/results/ 2>/dev/null || true
          fi
          # Rename per-seed dirs to results_seed<N> so --seeds-mode picks them up.
          # We use symlinks so the originals stay traceable in the artefact.
          for d in benchmark/results_ablation_${{ env.ABLATION }}_seed*/; do
            n=$(echo "$d" | sed -nE 's@.*_seed([0-9]+)/$@\1@p')
            [ -z "$n" ] && continue
            ln -sfn "$(realpath "$d")" "benchmark/results_seed${n}"
          done
      - name: Run sweep analysis (multi-seed, ablation)
        run: |
          python analysis/sweep_report.py \
            --root benchmark/results \
            --out analysis/out_ablation_${{ env.ABLATION }} \
            --seeds-mode \
            --ci-bootstrap-iters 10000
      - name: Generate job summary
        shell: bash
        run: |
          out_dir="analysis/out_ablation_${{ env.ABLATION }}"
          {
            echo "# Ablation: ${{ env.ABLATION }}"
            echo ""
            echo "**Profiles:** \`${{ env.PROFILES }}\`"
            echo "**Seeds:**    \`${{ env.SEEDS }}\`"
            echo ""
            if [ -f "$out_dir/summary_table_ci.csv" ]; then
              echo "## summary_table_ci.csv"
              echo '```'
              head -60 "$out_dir/summary_table_ci.csv"
              echo '```'
            fi
            if [ -f "$out_dir/paired_tests.csv" ]; then
              echo "## paired_tests.csv"
              echo '```'
              head -40 "$out_dir/paired_tests.csv"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload consolidated ablation artefacts
        uses: actions/upload-artifact@v4
        with:
          name: sweep-ablation-${{ env.ABLATION }}-consolidated
          path: |
            analysis/out_ablation_${{ env.ABLATION }}/**
            benchmark/results_ablation_${{ env.ABLATION }}_seed*/**
          retention-days: 90
