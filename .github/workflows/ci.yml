  smoke-training:
    name: Smoke training (custom2 / stereo=false / dev)
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache global npm (node-red)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-noderered-${{ runner.os }}-v4
      - name: Install Node-RED
        run: npm install -g --unsafe-perm node-red@4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run smoke training cell
        shell: pwsh
        run: |
          ./run_full_project.ps1 `
            -RunMode dev `
            -OnlyProfiles custom2 `
            -OnlyStereo false `
            -SkipBenchmark `
            -SkipPreflight
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-train-custom2-stereo-false
          path: |
            qtable_final_stereotypes_false_custom2.csv
            metrics_stereotypes_false_custom2.csv
            iv_stats_stereotypes_false_custom2.json
            learned_stereotypes_false_custom2.ttl
            log/train_custom2_stereo_false.log
            run_full_project.log
          if-no-files-found: warn
          retention-days: 7


