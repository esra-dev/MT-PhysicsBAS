name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Compile
        run: ./gradlew --no-daemon classes
      - name: Run unit tests
        run: ./gradlew --no-daemon test
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: build/reports/tests/test
          if-no-files-found: ignore

  validate-resources:
    name: Validate Turtle / scenarios / dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Validate Turtle resources
        run: ./gradlew --no-daemon validateTurtle
      - name: Validate scenario JSON files
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const dir = 'benchmark';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            let bad = 0;
            for (const f of files) {
              const p = path.join(dir, f);
              try {
                const data = JSON.parse(fs.readFileSync(p, 'utf8'));
                if (!Array.isArray(data)) throw new Error('top-level is not an array');
                console.log(' OK  ', f, '(', data.length, 'entries)');
              } catch (e) {
                console.error(' FAIL', f, '-', e.message);
                bad++;
              }
            }
            if (bad > 0) { console.error(bad, 'invalid file(s)'); process.exit(1); }
          "
      - name: Build dashboard
        working-directory: dashboard
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

  preflight-offline:
    name: Preflight (offline, simulator probe skipped)
    runs-on: ubuntu-latest
    needs: [build-test, validate-resources]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run preflight (skip simulator probe)
        run: ./gradlew --no-daemon preflight -Pprofiles=custom2,custom3,custom4,custom5,custom6,custom7 -PskipSimProbe
