锘縩ame: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Show wrapper info
        run: |
          set -x
          java -version
          ls -la gradle/wrapper/
          head -5 gradlew
          cat gradle/wrapper/gradle-wrapper.properties
      - name: Compile
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace --info classes 2>&1 | tee gradle-classes.log
      - name: Dump compile log on failure
        if: failure()
        run: |
          echo '## Compile failure (last 200 lines)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 gradle-classes.log >> "$GITHUB_STEP_SUMMARY" || echo '(no log)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Publish compile log to ci-debug-logs branch
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tmp=$(mktemp -d)
          cp gradle-classes.log "$tmp/build-test-classes.log" || echo '(no log captured)' > "$tmp/build-test-classes.log"
          cd "$tmp"
          git init -q -b ci-debug-logs
          git config user.email ci@github
          git config user.name ci
          git add -A
          git commit -q -m "build-test log #${GITHUB_RUN_NUMBER}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin ci-debug-logs
      - name: Run unit tests
        run: ./gradlew --no-daemon test
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: build/reports/tests/test
          if-no-files-found: ignore

  validate-resources:
    name: Validate Turtle / scenarios / dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Validate Turtle resources
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace --info validateTurtle 2>&1 | tee gradle-ttl.log
      - name: Dump validateTurtle log on failure
        if: failure()
        run: |
          echo '## validateTurtle failure (last 200 lines)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 gradle-ttl.log >> "$GITHUB_STEP_SUMMARY" || echo '(no log)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Publish validateTurtle log to ci-debug-validate branch
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          tmp=$(mktemp -d)
          if [ -f gradle-ttl.log ]; then cp gradle-ttl.log "$tmp/validate-resources-ttl.log"; else echo '(no log captured)' > "$tmp/validate-resources-ttl.log"; fi
          cd "$tmp"
          git init -q -b ci-debug-validate
          git config user.email ci@github
          git config user.name ci
          git add -A
          git commit -q -m "validate-resources log #${GITHUB_RUN_NUMBER}" || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin ci-debug-validate || true
      - name: Validate scenario JSON files
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const dir = 'benchmark';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            let bad = 0;
            for (const f of files) {
              const p = path.join(dir, f);
              try {
                let txt = fs.readFileSync(p, 'utf8');
                if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1); // strip UTF-8 BOM
                const data = JSON.parse(txt);
                if (!Array.isArray(data)) throw new Error('top-level is not an array');
                console.log(' OK  ', f, '(', data.length, 'entries)');
              } catch (e) {
                console.error(' FAIL', f, '-', e.message);
                bad++;
              }
            }
            if (bad > 0) { console.error(bad, 'invalid file(s)'); process.exit(1); }
          "
      - name: Build dashboard
        working-directory: dashboard
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

  preflight-offline:
    name: Preflight (offline, simulator probe skipped)
    runs-on: ubuntu-latest
    needs: [build-test, validate-resources]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run preflight (skip simulator probe)
        run: ./gradlew --no-daemon preflight -Pprofiles=custom2,custom3,custom4,custom5,custom6,custom7 -PskipSimProbe

