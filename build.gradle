// ─────────────────────────────────────────────────────────────────────────
// Phase 12 #6 — preflight & resource validation
// ─────────────────────────────────────────────────────────────────────────

// validateTurtle: parse every *.ttl under src/resources with Jena and fail
// the build if any file is syntactically invalid. Useful as a CI gate and
// as a precondition for the preflight task. Implemented as a JavaExec task
// (Jena lives on the main runtime classpath, not the buildscript classpath).
task validateTurtle(type: JavaExec, dependsOn: 'classes') {
    description 'Validates every Turtle file under src/resources parses with Jena.'
    group ' MT-Esra'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'tools.TurtleValidator'
    args 'src/resources'
}

// preflight: lightweight sanity checks before a long sweep. Validates that
// each requested profile has the expected ttl, ontology, and scenario JSON
// files, and that simulator ports respond to /health (unless -PskipSimProbe
// is passed). Run via:
//   gradlew preflight -Pprofiles=custom2,custom3
//   gradlew preflight -Pprofiles=custom2 -PskipSimProbe
task preflight(dependsOn: 'validateTurtle') {
    description 'Phase 12 #6: validate profiles, scenarios, ontology, and simulator availability.'
    group ' MT-Esra'

    doLast {
        def profileList = (project.findProperty('profiles')
            ?: 'custom2,custom3,custom4,custom5,custom6,custom7')
                .split(',').collect { it.trim() }.findAll { !it.isEmpty() }
        boolean skipSim = project.hasProperty('skipSimProbe')

        // #1: prefer config/run_config.json as single source of truth for
        // the simulator port map. Falls back to the historical literal so
        // checkouts without the config file still run.
        def portMap = [
            custom2: 1882, custom3: 1883, custom4: 1884,
            custom5: 1885, custom6: 1886, custom7: 1887
        ]
        def runCfg = file('config/run_config.json')
        if (runCfg.exists()) {
            try {
                def text = runCfg.getText('UTF-8')
                if (text.startsWith('\uFEFF')) { text = text.substring(1) }
                def parsed = new groovy.json.JsonSlurper().parseText(text)
                if (parsed.simulator_port_map instanceof Map) {
                    def loaded = [:]
                    parsed.simulator_port_map.each { k, v -> loaded[k.toString()] = v as int }
                    if (!loaded.isEmpty()) { portMap = loaded }
                }
            } catch (Throwable t) {
                println "      (warn) failed to read simulator_port_map from ${runCfg.path}: ${t.message}"
            }
        }

        def errors = []
        def passed = []

        profileList.each { profile ->
            def profileErrors = []

            // 1. TD interactions file (per-profile or shared 'custom').
            def tdRes = file("src/resources/interactions-lab-${profile}.ttl")
            def tdAlt = file("src/resources/interactions-lab-custom.ttl")
            if (!tdRes.exists() && !tdAlt.exists()) {
                profileErrors << "missing TD: src/resources/interactions-lab-${profile}.ttl"
            }

            // 2. Scenario JSON files. train_scenarios_<profile>.json is
            // optional (only custom2 + a 'full' aggregate exist on disk; other
            // profiles share train_scenarios_full.json or train_scenarios.json).
            def scen      = file("benchmark/scenarios_${profile}.json")
            def trainScen = file("benchmark/train_scenarios_${profile}.json")
            if (!scen.exists()) profileErrors << "missing scenarios: ${scen.path}"
            if (!trainScen.exists()) {
                println "      (info) optional ${trainScen.name} not present — runs use train_scenarios_full.json"
            }

            // 3. Validate JSON parse where present (BOM-tolerant).
            [scen, trainScen].each { jf ->
                if (jf.exists()) {
                    try {
                        def text = jf.getText('UTF-8')
                        if (text.startsWith('\uFEFF')) { text = text.substring(1) }
                        new groovy.json.JsonSlurper().parseText(text)
                    } catch (Throwable t) {
                        profileErrors << "${jf.name} not valid JSON: ${t.message}"
                    }
                }
            }

            // 4. Ontology files (canonical names).
            def ont1 = file("src/resources/lab-ontology.ttl")
            def ont2 = file("src/resources/wot-mappings.ttl")
            if (!ont1.exists()) profileErrors << "missing ontology: ${ont1.path}"
            if (!ont2.exists()) profileErrors << "missing wot mappings: ${ont2.path}"

            // 5. Simulator /health probe (skipped in CI / when sims are down).
            if (!skipSim && portMap.containsKey(profile)) {
                int port = portMap[profile]
                try {
                    def url = new java.net.URL("http://127.0.0.1:${port}/health")
                    def conn = (java.net.HttpURLConnection) url.openConnection()
                    conn.setConnectTimeout(2000)
                    conn.setReadTimeout(2000)
                    conn.setRequestMethod('GET')
                    int rc = conn.getResponseCode()
                    if (rc != 200) profileErrors << "simulator health check :${port} returned HTTP ${rc}"
                } catch (Throwable t) {
                    profileErrors << "simulator unreachable :${port} (${t.class.simpleName}: ${t.message})"
                }
            }

            if (profileErrors.isEmpty()) {
                passed << profile
                println " OK   ${profile}"
            } else {
                profileErrors.each { e -> println " FAIL ${profile} - ${e}" }
                errors.addAll(profileErrors.collect { "[${profile}] ${it}" })
            }
        }

        println "--- preflight summary: ${passed.size()}/${profileList.size()} profile(s) passed ---"
        if (!errors.isEmpty()) {
            throw new GradleException("preflight: ${errors.size()} check(s) failed.")
        }
    }
}
