/*
   MT-Esra: Illuminance Controller Agent
   
   Simplified version without Q-learning.
   The agent uses rule-based control to achieve target illuminance levels.
   
   Gradle build file for JaCaMo Application
*/

defaultTasks 'run'

apply plugin: 'java'
apply plugin: 'eclipse'

version '1.0'
group   'org.jacamo'

repositories {
    mavenCentral()

    maven { url "https://raw.githubusercontent.com/jacamo-lang/mvn-repo/master" }
    maven { url "https://repo.gradle.org/gradle/libs-releases" }
    maven { url 'https://jitpack.io' }
}

dependencies {
    implementation('com.github.GiugAles:jacamo:SS2025')
    implementation ('com.github.GiugAles:jacamo-hypermedia:SS2025-1')
    implementation 'com.github.Interactions-HSG:wot-td-java:master-SNAPSHOT'
    implementation 'com.google.guava:guava:23.5-jre'
    implementation 'org.apache.httpcomponents.client5:httpclient5:5.0'
    implementation 'org.apache.httpcomponents.client5:httpclient5-fluent:5.0'
    // Apache Jena ARQ: RDF model loading + SPARQL 1.1 query engine
    // Used by OntologyArtifact to load lab-ontology.ttl and run SPARQL SELECT queries
    implementation 'org.apache.jena:jena-arq:4.10.0'

    // ── Phase 12 #4: structured logging via SLF4J + Logback ─────────────
    // logback-classic implements SLF4J; logstash-encoder emits JSON lines
    // for ingestion by ELK / Loki / Splunk; jul-to-slf4j routes the heavy
    // java.util.logging usage in env/tools/* through the same pipeline.
    implementation 'ch.qos.logback:logback-classic:1.5.6'
    implementation 'net.logstash.logback:logstash-logback-encoder:7.4'
    implementation 'org.slf4j:jul-to-slf4j:2.0.13'

    // ── Phase 12 #2: unit-test dependencies ─────────────────────────────
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
}

// JUnit 5 test wiring (Phase 12 #2). Tests live under src/test/java; if the
// directory is empty, the test task is simply a no-op.
test {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = false
    }
}

sourceSets {
    main {
        java {
            srcDir 'src/env'
            srcDir 'src/agt'
            srcDir 'src/org'
            srcDir 'src/int'
            srcDir 'src/java'
        }
        resources {
            srcDir 'src/resources'
        }
    }
    test {
        java {
            srcDir 'src/test/java'
        }
        resources {
            srcDir 'src/test/resources'
        }
    }
}

task task (type: JavaExec, dependsOn: 'classes') {
    description 'runs the application for task'
    group ' JaCaMo'
    main = 'jacamo.infra.JaCaMoLauncher'
    args 'task.jcm'
    classpath sourceSets.main.runtimeClasspath
}

// Q-Learning agent task.
// Switch stereotype mode:  edit use_stereotypes(true/false) in
//   src/agt/illuminance_controller_agent_ql.asl
// Run while Node-RED simulator is running (port 1881 for custom lab).
task taskQl (type: JavaExec, dependsOn: 'classes') {
    description 'runs the Q-learning illuminance controller agent'
    group ' JaCaMo'
    main = 'jacamo.infra.JaCaMoLauncher'
    args 'task_ql.jcm'
    classpath sourceSets.main.runtimeClasspath

    // -Pprofile=<id> sets the JVM system property active.profile, which the
    // QL agent reads at startup via tools.jia.system_prop and uses to
    // override the default active_profile/1 belief (#7). No .asl mutation
    // required.
    doFirst {
        def overrideProfile = project.findProperty('profile')
        if (overrideProfile) {
            systemProperty 'active.profile', overrideProfile
            println "taskQl: active.profile=${overrideProfile}"
        }
    }
}

// Benchmark agent task.
// Runs all three agent modes against 20 fixed scenarios Ã— 5 runs.
// Set bench_mode belief in illuminance_controller_agent_bench.asl before running,
// or override transiently with -Pmode=<rule_based|ql_false|ql_true>.
// Run while Node-RED simulator is running (port 1881, simulator_flow_custom.json).
task taskBench (type: JavaExec, dependsOn: 'classes') {
    description 'runs the execution-phase benchmark (rule-based vs ql_false vs ql_true)'
    group ' JaCaMo'
    main = 'jacamo.infra.JaCaMoLauncher'
    args 'task_bench.jcm'
    classpath sourceSets.main.runtimeClasspath

    // -Pmode=<mode> sets the JVM system property bench.mode, which the bench
    // agent reads at startup via tools.jia.system_prop and uses to override
    // the default bench_mode/1 belief (#7). No .asl mutation required.
    doFirst {
        def overrideMode = project.findProperty('mode')
        if (overrideMode) {
            systemProperty 'bench.mode', overrideMode
            println "taskBench: bench.mode=${overrideMode}"
        }
    }
}

clean {
    delete 'bin'
    delete 'build'
}

// ─────────────────────────────────────────────────────────────────────────
// Phase 12 #1 — Forward simulator HTTP tuning props from -P/-D into the
// child JVMs that run JaCaMo. Sourced from config/run_config.json by
// run_full_project.ps1 (which appends -Psim.http.*=… to the gradle call).
// LabEnvironment.init reads them via System.getProperty.
// ─────────────────────────────────────────────────────────────────────────
def _httpKeys = ['sim.http.connectMs','sim.http.responseMs','sim.http.maxRetries','sim.http.backoffMs']
tasks.withType(JavaExec).configureEach {
    doFirst {
        _httpKeys.each { key ->
            def val = project.findProperty(key)
            if (val != null && val.toString() != '') {
                systemProperty key, val.toString()
            }
        }
    }
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Phase 5 â€” full sweep harness
//
// Runs the benchmark across all (lab Ã— mode) cells and archives each cell's
// CSV/JSONL artefacts under benchmark/results/<profile>/<mode>/. The driver
// flips two belief atoms before each cell:
//   - active_profile("<profile>") in src/agt/lab_profiles.asl
//   - bench_mode("<mode>")        in src/agt/illuminance_controller_agent_bench.asl
//
// Profiles: custom2..custom7   (4-zone weakness labs)
// Modes:    rule_based, ql_false, ql_true
//
// Usage:
//   gradlew runFullSweep                 # all profiles Ã— all modes
//   gradlew runFullSweep -Pprofiles=custom2,custom4 -Pmodes=ql_true
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
task runFullSweep(dependsOn: 'classes') {
    description 'Phase 5: sweep benchmark over (profile Ã— mode) cells'
    group ' JaCaMo'

    doLast {
        def profileList = (project.findProperty('profiles')
            ?: 'custom2,custom3,custom4,custom5,custom6,custom7')
                .split(',').collect { it.trim() }.findAll { !it.isEmpty() }
        def modeList    = (project.findProperty('modes')
                ?: 'rule_based,ql_false,ql_true')
                .split(',').collect { it.trim() }.findAll { !it.isEmpty() }

        def resultsRoot = file('benchmark/results')
        resultsRoot.mkdirs()

        profileList.each { profile ->
            modeList.each { mode ->
                println "─────────────────────────────────────────────"
                println " runFullSweep: profile=${profile} mode=${mode}"
                println "─────────────────────────────────────────────"

                // Pass overrides via system properties (#7). The agents
                // read these via tools.jia.system_prop at startup and
                // rebind active_profile/1 and bench_mode/1 accordingly,
                // so the .asl source files are no longer mutated.
                javaexec {
                    main        = 'jacamo.infra.JaCaMoLauncher'
                    args        = ['task_bench.jcm']
                    classpath   = sourceSets.main.runtimeClasspath
                    systemProperty 'active.profile', profile
                    systemProperty 'bench.mode',     mode
                }

                // Archive output artefacts (whichever exist for this mode).
                def cellDir = file("benchmark/results/${profile}/${mode}")
                cellDir.mkdirs()
                fileTree(projectDir).matching {
                    include 'benchmark_results_*.csv'
                    include 'metrics_stereotypes_*.csv'
                    include 'iv_stats_stereotypes_*.json'
                    include 'qtable_final_stereotypes_*.csv'
                    include 'coverage_stereotypes_*.csv'
                    include 'first_goal_stereotypes_*.csv'
                    include 'learned_stereotypes_*.ttl'
                }.each { artefact ->
                    copy {
                        from artefact
                        into cellDir
                    }
                }
            }
        }

        println "runFullSweep complete. Results under: ${resultsRoot}"
    }
}

